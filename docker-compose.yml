services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    platform: linux/arm64
    container_name: sporty-group-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@172.30.0.10:29093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_HEAP_OPTS: "-Xms192m -Xmx192m"
      KAFKA_TRANSACTION_STATE_LOG_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.30.0.10:9092,PLAINTEXT_HOST://localhost:9094
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9092'"]
      start_period: 20s
      interval: 10s
      timeout: 10s
      retries: 12
    ports:
      - "9094:9094"
    networks:
      default:
        ipv4_address: 172.30.0.10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    platform: linux/arm64
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - until kafka-topics --bootstrap-server 172.30.0.10:9092 --list >/dev/null 2>&1; do sleep 5; done; kafka-topics --bootstrap-server 172.30.0.10:9092 --create --if-not-exists --topic event-outcomes --partitions 1 --replication-factor 1
    restart: "no"

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    platform: linux/arm64
    container_name: sporty-group-rocketmq-namesrv
    restart: unless-stopped
    command: sh /home/rocketmq/rocketmq-5.3.2/bin/mqnamesrv
    environment:
      HEAP_OPTS: "-Xms96m -Xmx96m -Xmn48m"
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    platform: linux/arm64
    container_name: sporty-group-rocketmq-broker
    restart: unless-stopped
    command: sh /home/rocketmq/rocketmq-5.3.2/bin/mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
    environment:
      HEAP_OPTS: "-Xms192m -Xmx192m -Xmn96m -XX:MaxDirectMemorySize=128m"
      JAVA_OPT_EXT: "-XX:-AlwaysPreTouch"
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf:ro

  rocketmq-init:
    image: apache/rocketmq:5.3.2
    platform: linux/arm64
    depends_on:
      - rocketmq-broker
    entrypoint:
      - /bin/sh
      - -c
      - until sh /home/rocketmq/rocketmq-5.3.2/bin/mqadmin clusterList -n rocketmq-namesrv:9876 >/dev/null 2>&1; do sleep 5; done; sh /home/rocketmq/rocketmq-5.3.2/bin/mqadmin updateTopic -n rocketmq-namesrv:9876 -c DefaultCluster -t bet-settlements
    restart: "no"

  events-input-service:
    build:
      context: .
      dockerfile: events-input-service/Dockerfile
    container_name: sporty-group-events-input-service
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      JAVA_OPTS: "-Xms128m -Xmx256m"
      KAFKA_BOOTSTRAP_SERVERS: 172.30.0.10:9092
    ports:
      - "8081:8080"
    volumes:
      - ./logs:/logs

  events-bets-matching-service:
    build:
      context: .
      dockerfile: events-bets-matching-service/Dockerfile
    container_name: sporty-group-events-bets-matching-service
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      rocketmq-init:
        condition: service_completed_successfully
    environment:
      APP_SQL_DATA: file:/app/sql/data.sql
      APP_SQL_SCHEMA: file:/app/sql/schema.sql
      JAVA_OPTS: "-Xms256m -Xmx512m"
      KAFKA_BOOTSTRAP_SERVERS: 172.30.0.10:9092
      ROCKETMQ_NAMESERVER: rocketmq-namesrv:9876
    ports:
      - "8082:8080"
    volumes:
      - ./logs:/logs

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24
